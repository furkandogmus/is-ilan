<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>is-ilan — LinkedIn İş İlanı Arama</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --text: #c9d1d9; --dim: #8b949e; --muted: #484f58;
  --accent: #58a6ff; --green: #3fb950; --yellow: #d29922;
  --red: #f85149; --purple: #a371f7;
  --radius: 8px; --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
body { background: var(--bg); color: var(--text); font-family: var(--font); line-height: 1.5; min-height: 100vh; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

.container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

header { text-align: center; padding: 32px 0 20px; }
header h1 { font-size: 28px; font-weight: 700; color: var(--accent); }
header p { color: var(--dim); font-size: 14px; margin-top: 4px; }

.search-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 24px; }
.search-row { display: flex; gap: 10px; flex-wrap: wrap; }
.search-row input { flex: 1 1 200px; }
input, select, button {
  background: var(--bg); color: var(--text); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 12px; font-size: 14px; font-family: var(--font);
  outline: none; transition: border-color .15s;
}
input:focus, select:focus { border-color: var(--accent); }
button {
  background: var(--accent); color: #fff; border: none; cursor: pointer;
  font-weight: 600; padding: 8px 20px; white-space: nowrap;
}
button:hover { opacity: .9; }
button:disabled { opacity: .5; cursor: not-allowed; }

.filters { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
.filters label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--dim); cursor: pointer; }
.filters input[type="number"] { width: 70px; }
.filters input[type="checkbox"] { accent-color: var(--accent); width: 14px; height: 14px; }

.stats { display: flex; gap: 20px; padding: 12px 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; flex-wrap: wrap; }
.stat { font-size: 13px; }
.stat strong { color: var(--accent); }
.stat .new-count { color: var(--green); }

.job-list { list-style: none; }
.job-card {
  border-bottom: 1px solid var(--border); padding: 14px 0;
  display: flex; gap: 12px; align-items: flex-start;
}
.job-card:last-child { border-bottom: none; }
.job-new { color: var(--green); font-weight: 700; font-size: 18px; line-height: 1.2; min-width: 24px; text-align: center; }
.job-old { color: var(--muted); font-size: 18px; min-width: 24px; text-align: center; }
.job-info { flex: 1; min-width: 0; }
.job-title { font-weight: 600; font-size: 15px; }
.job-title a { color: var(--text); }
.job-title a:hover { color: var(--accent); text-decoration: none; }
.job-meta { font-size: 13px; color: var(--dim); margin-top: 2px; }
.job-meta .company { color: var(--accent); }
.job-meta .separator { color: var(--muted); margin: 0 6px; }
.job-meta .time { color: var(--yellow); }

.empty { text-align: center; color: var(--dim); padding: 40px 0; }
.loading { text-align: center; color: var(--dim); padding: 40px 0; }
.error { background: rgba(248,81,73,.1); border: 1px solid var(--red); color: var(--red); border-radius: var(--radius); padding: 12px; margin-bottom: 16px; font-size: 13px; }
.spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top: 2px solid var(--accent); border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }

footer { text-align: center; color: var(--muted); font-size: 12px; padding: 40px 0 20px; }

@media (max-width: 600px) {
  .search-row { flex-direction: column; }
  .filters { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>is-ilan</h1>
    <p>LinkedIn iş ilanlarını terminal kullanmadan ara</p>
  </header>

  <div class="search-box">
    <div class="search-row">
      <input type="text" id="keywords" placeholder="Anahtar kelime (örn: python, devops)" value="devops" autofocus>
      <input type="text" id="location" placeholder="Konum (örn: Istanbul, Turkey)" value="Turkey">
      <button id="searchBtn" onclick="search()">Ara</button>
    </div>
    <div class="filters">
      <label><input type="number" id="hours" value="24" min="1" max="720"> saat içinde</label>
      <label><input type="checkbox" id="remote"> Remote</label>
      <label><input type="number" id="pages" value="1" min="1" max="10"> sayfa</label>
      <input type="text" id="titleFilter" placeholder="Başlık filtresi (regex)" style="flex:1;min-width:160px">
    </div>
  </div>

  <div id="error" class="error" style="display:none"></div>

  <div id="stats" class="stats" style="display:none"></div>

  <div id="loading" class="loading" style="display:none"><span class="spinner"></span> Aranıyor...</div>

  <ul id="results" class="job-list"></ul>
  <div id="empty" class="empty" style="display:none">İlan bulunamadı. Farklı anahtar kelimelerle deneyin.</div>

  <footer>
    <a href="https://github.com/furkandogmus/is-ilan" target="_blank">github.com/furkandogmus/is-ilan</a>
    &nbsp;·&nbsp; Terminal için: <code>python3 is_ilan.py</code>
  </footer>
</div>

<script>
async function search() {
  const keywords = document.getElementById('keywords').value.trim() || 'devops';
  const location = document.getElementById('location').value.trim() || 'Turkey';
  const hours = document.getElementById('hours').value || '24';
  const remote = document.getElementById('remote').checked;
  const pages = parseInt(document.getElementById('pages').value) || 1;
  const titleFilter = document.getElementById('titleFilter').value.trim();

  const resultsEl = document.getElementById('results');
  const statsEl = document.getElementById('stats');
  const loadingEl = document.getElementById('loading');
  const emptyEl = document.getElementById('empty');
  const errorEl = document.getElementById('error');
  const btn = document.getElementById('searchBtn');

  resultsEl.innerHTML = '';
  statsEl.style.display = 'none';
  emptyEl.style.display = 'none';
  errorEl.style.display = 'none';
  loadingEl.style.display = 'block';
  btn.disabled = true;

  const allJobs = [];
  let fetchError = null;

  for (let page = 0; page < pages; page++) {
    const params = new URLSearchParams({ keywords, location, hours, start: page * 25 });
    if (remote) { params.set('remote', '1'); params.delete('location'); }

    try {
      const resp = await fetch(`/api/search?${params.toString()}`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const html = await resp.text();
      const pageJobs = parseJobs(html);

      allJobs.push(...pageJobs);
      if (pageJobs.length === 0) break;

      if (page < pages - 1) {
        await new Promise(r => setTimeout(r, 1500));
      }
    } catch (e) {
      fetchError = e.message;
      break;
    }
  }

  loadingEl.style.display = 'none';
  btn.disabled = false;

  if (fetchError && allJobs.length === 0) {
    errorEl.textContent = 'Hata: İlanlar alınamadı. Sunucunun çalıştığından emin olun (python3 server.py).';
    errorEl.style.display = 'block';
    return;
  }

  let jobs = allJobs;

  if (titleFilter) {
    try {
      const re = new RegExp(titleFilter, 'i');
      jobs = jobs.filter(j => re.test(j.title));
    } catch (e) {
      errorEl.textContent = 'Geçersiz regex: ' + e.message;
      errorEl.style.display = 'block';
      return;
    }
  }

  const seen = JSON.parse(localStorage.getItem('is_ilan_seen') || '[]');
  const seenSet = new Set(seen);

  statsEl.style.display = 'flex';
  const newCount = jobs.filter(j => !seenSet.has(j.id)).length;
  statsEl.innerHTML = `
    <div class="stat">Aranan: <strong>${escapeHtml(keywords)}</strong></div>
    <div class="stat">Konum: <strong>${remote ? 'Remote' : escapeHtml(location)}</strong></div>
    <div class="stat">Toplam: <strong>${jobs.length}</strong></div>
    <div class="stat">Yeni: <strong class="new-count">${newCount}</strong></div>
    ${fetchError ? `<div class="stat" style="color:var(--yellow)">Sayfa hatası: ${escapeHtml(fetchError)}</div>` : ''}
  `;

  if (jobs.length === 0) {
    emptyEl.style.display = 'block';
    return;
  }

  resultsEl.innerHTML = jobs.map(j => {
    const isNew = !seenSet.has(j.id);
    return `
      <li class="job-card">
        <span class="${isNew ? 'job-new' : 'job-old'}">${isNew ? '★' : '·'}</span>
        <div class="job-info">
          <div class="job-title">
            <a href="${escapeHtml(j.url)}" target="_blank">${escapeHtml(j.title)}</a>
          </div>
          <div class="job-meta">
            <span class="company">${escapeHtml(j.company)}</span>
            ${j.location ? `<span class="separator">·</span>${escapeHtml(j.location)}` : ''}
            ${j.listed ? `<span class="separator">·</span><span class="time">${escapeHtml(j.listed)}</span>` : ''}
          </div>
        </div>
      </li>
    `;
  }).join('');

  const newIds = [...new Set([...seenSet, ...jobs.map(j => j.id)])];
  localStorage.setItem('is_ilan_seen', JSON.stringify(newIds.slice(0, 500)));
}

function parseJobs(html) {
  const jobs = [];
  const blocks = html.split(/data-entity-urn="urn:li:jobPosting:/);
  for (let i = 1; i < blocks.length; i++) {
    const block = blocks[i];
    const idMatch = block.match(/^(\d+)/);
    if (!idMatch) continue;
    const id = idMatch[1];

    const grab = (pattern) => {
      const m = block.match(pattern);
      if (!m) return '';
      const d = document.createElement('textarea');
      d.innerHTML = m[1].trim();
      return d.value;
    };

    const title = grab(/base-search-card__title">\s*(.*?)\s*<\/h3>/s).replace(/\s+/g, ' ');

    let company = grab(/base-search-card__subtitle">.*?>\s*(.*?)\s*<\/a>/s);
    if (!company) company = grab(/base-search-card__subtitle">\s*(.*?)\s*<\/h4>/s);
    company = company.replace(/\s+/g, ' ');

    const location = grab(/job-search-card__location">\s*(.*?)\s*<\/span>/s).replace(/\s+/g, ' ');
    const listed = grab(/<time[^>]*datetime="([^"]+)"/);
    let url = grab(/href="(https:\/\/[^"]*?\/jobs\/view\/[^"]*?)"/);
    url = url.split('?')[0];

    if (id && title) {
      jobs.push({ id, title, company, location, listed, url });
    }
  }
  return jobs;
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement?.tagName === 'INPUT') {
    search();
  }
});
</script>
</body>
</html>
